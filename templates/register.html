<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация — AI Ассистент</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="container-sm">
    <div class="auth-card">
      <div class="logo">📚</div>
      <h1>Создать аккаунт</h1>
      <p>Начни подготовку к экзаменам</p>

      <div class="card">
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST">
          <div class="form-group">
            <label for="name">Имя</label>
            <input type="text" id="name" name="name" class="form-input" placeholder="Твоё имя">
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" class="form-input" placeholder="your@email.com" required>
          </div>
          <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" class="form-input" placeholder="Минимум 6 символов" minlength="6" required>
          </div>
          <div class="form-group">
            <label for="subject">Предмет</label>
            <select id="subject" name="subject" class="form-select">
              <option value="math">Математика</option>
              <option value="russian">Русский язык</option>
              <option value="informatics">Информатика</option>
            </select>
          </div>
          <div class="form-group">
            <label for="grade">Класс</label>
            <select id="grade" name="grade" class="form-select">
              <option value="8">8 класс</option>
              <option value="9" selected>9 класс (ОГЭ)</option>
              <option value="10">10 класс</option>
              <option value="11">11 класс (ЕГЭ)</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Зарегистрироваться</button>
        </form>
      </div>

      <div class="auth-footer">
        Уже есть аккаунт? <a href="/login">Войти</a>
      </div>
    </div>
  </div>
</body>
</html>
